AutoName: Aster Mail
Description: |-
    Private, end-to-end encrypted email client for astermail.org accounts.

    Messages are encrypted client-side before leaving your device. The server stores
    only ciphertext - Aster never sees plaintext content.

    Features include a post-quantum ratchet protocol for mail between Aster users,
    custom domain support, UnifiedPush notifications (no Google services required),
    biometric lock, private mode notifications, offline-capable encrypted local
    storage, and attachment support.

    This F-Droid build contains no Firebase or Google Play Services dependencies.
    Push notifications are delivered via any UnifiedPush-compatible distributor
    (ntfy, Unified Push, etc.). Background polling provides a fallback when no
    distributor is installed.

