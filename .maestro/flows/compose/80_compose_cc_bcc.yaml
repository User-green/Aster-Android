appId: ${APP_ID}
tags:
  - compose
  - manual
name: compose_cc_bcc_expand
---
- runFlow: ../../setup/sign_in.yaml
- tapOn:
    id: "compose"
    optional: true
- extendedWaitUntil:
    visible: "Subject"
    timeout: 10000
- tapOn:
    text: "Cc"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: cc_expanded
- tapOn:
    text: "Bcc"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: bcc_expanded
- back
- runFlow:
    when:
      visible: "Discard"
    commands:
      - tapOn: "Discard"
