appId: ${APP_ID}
tags:
  - compose
  - manual
name: compose_expiring_email_toggle
---
- runFlow: ../../setup/sign_in.yaml
- tapOn:
    id: "compose"
    optional: true
- extendedWaitUntil:
    visible: "Subject"
    timeout: 10000
- tapOn:
    id: "more"
    optional: true
- tapOn:
    text: "Expir"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: expiring_email_picker
- back
- back
- back
- runFlow:
    when:
      visible: "Discard"
    commands:
      - tapOn: "Discard"
