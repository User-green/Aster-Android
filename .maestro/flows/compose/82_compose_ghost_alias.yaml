appId: ${APP_ID}
tags:
  - compose
  - manual
name: compose_ghost_alias_creation_sheet
---
- runFlow: ../../setup/sign_in.yaml
- tapOn:
    id: "compose"
    optional: true
- extendedWaitUntil:
    visible: "Subject"
    timeout: 10000
- tapOn:
    id: "from_field"
    optional: true
- tapOn:
    text: "Create"
    optional: true
- runFlow:
    when:
      notVisible: "alias"
    commands:
      - tapOn:
          text: "New"
          optional: true
- waitForAnimationToEnd
- takeScreenshot: ghost_alias_sheet
- tapOn:
    text: "Cancel"
    optional: true
- back
- back
- runFlow:
    when:
      visible: "Discard"
    commands:
      - tapOn: "Discard"
