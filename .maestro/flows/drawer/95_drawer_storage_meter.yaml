appId: ${APP_ID}
tags:
  - drawer
  - manual
name: drawer_storage_meter_visible
---
- runFlow: ../../setup/sign_in.yaml
- swipe:
    start: 5%,50%
    end: 80%,50%
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: ".*GB.*"
    direction: DOWN
    timeout: 5000
    optional: true
- takeScreenshot: drawer_storage_meter
- tapOn:
    text: ".*GB.*"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: storage_after_tap
- back
