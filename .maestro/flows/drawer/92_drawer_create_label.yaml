appId: ${APP_ID}
tags:
  - drawer
  - manual
name: drawer_create_label_dialog
---
- runFlow: ../../setup/sign_in.yaml
- swipe:
    start: 5%,50%
    end: 80%,50%
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Labels"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "create_label"
    optional: true
- runFlow:
    when:
      notVisible: "Label Name"
    commands:
      - tapOn:
          text: "New Label"
          optional: true
- waitForAnimationToEnd
- takeScreenshot: create_label_dialog
- tapOn:
    text: "Cancel"
    optional: true
