appId: ${APP_ID}
tags:
  - search
  - manual
name: search_attachment_filter_chip
---
- runFlow: ../../setup/sign_in.yaml
- tapOn:
    id: "search"
    optional: true
- runFlow:
    when:
      notVisible: "Search"
    commands:
      - tapOn:
          text: "Search"
          optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Attachment"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: search_attachment_filter
- back
