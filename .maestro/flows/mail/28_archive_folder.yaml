appId: ${APP_ID}
tags:
  - mail
name: archive_folder_opens
---
- runFlow: ../../setup/sign_in.yaml
- assertVisible: "Inbox"
- swipe:
    start: 5%,50%
    end: 80%,50%
- waitForAnimationToEnd
- tapOn:
    text: "Archive"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: archive_folder
- swipe:
    start: 5%,50%
    end: 80%,50%
- tapOn: "Inbox"
