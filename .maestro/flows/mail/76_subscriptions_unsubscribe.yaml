appId: ${APP_ID}
tags:
  - mail
  - manual
name: mailing_lists_unsubscribe_button
---
- runFlow: ../../setup/sign_in.yaml
- swipe:
    start: 5%,50%
    end: 80%,50%
- waitForAnimationToEnd
- tapOn:
    text: "Subscriptions"
    optional: true
- extendedWaitUntil:
    visible: "Subscriptions"
    timeout: 10000
- takeScreenshot: subscriptions_screen
- tapOn:
    text: "Unsubscribe"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: after_unsubscribe
- back
