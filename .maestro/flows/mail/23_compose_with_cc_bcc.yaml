appId: ${APP_ID}
tags:
  - mail
name: compose_expands_cc_and_bcc
---
- runFlow: ../../setup/sign_in.yaml
- assertVisible: "Inbox"
- tapOn:
    id: "compose"
    optional: true
- runFlow:
    when:
      notVisible: "Subject"
    commands:
      - tapOn:
          text: "compose"
          optional: true
- extendedWaitUntil:
    visible: "Subject"
    timeout: 10000
- tapOn:
    text: "Cc"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: cc_expanded
- tapOn:
    text: "Bcc"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: bcc_expanded
- back
