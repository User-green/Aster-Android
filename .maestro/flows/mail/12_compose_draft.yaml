appId: ${APP_ID}
tags:
  - mail
name: compose_screen_opens_and_draft_persists
---
- runFlow: ../../setup/sign_in.yaml
- assertVisible: "Inbox"
- tapOn:
    id: "compose"
    optional: true
- runFlow:
    when:
      notVisible: "Subject"
    commands:
      - tapOn:
          text: "compose"
          optional: true
- extendedWaitUntil:
    visible: "Subject"
    timeout: 10000
- takeScreenshot: compose_open
- tapOn: "Subject"
- inputText: "Maestro draft test"
- hideKeyboard
- takeScreenshot: compose_with_subject
- back
- waitForAnimationToEnd
- takeScreenshot: after_compose_close
