appId: ${APP_ID}
tags:
  - mail
  - manual
name: starred_filter_opens
---
- runFlow: ../../setup/sign_in.yaml
- assertVisible: "Inbox"
- swipe:
    start: 5%,50%
    end: 80%,50%
- waitForAnimationToEnd
- tapOn:
    text: "Starred"
    optional: true
- extendedWaitUntil:
    visible: "Starred"
    timeout: 10000
- takeScreenshot: starred_filter
