appId: ${APP_ID}
tags:
  - mail
  - manual
name: pending_send_preview_undo
---
- runFlow: ../../setup/sign_in.yaml
- tapOn:
    id: "compose"
    optional: true
- extendedWaitUntil:
    visible: "Subject"
    timeout: 10000
- tapOn:
    text: "To"
    optional: true
- inputText: ${TEST_USERNAME}@${TEST_DOMAIN}
- hideKeyboard
- tapOn: "Subject"
- inputText: "Pending preview test"
- hideKeyboard
- tapOn: "Send"
- extendedWaitUntil:
    visible: "Undo"
    timeout: 5000
- takeScreenshot: pending_send_preview
- tapOn: "Undo"
- extendedWaitUntil:
    visible: "Subject"
    timeout: 5000
- takeScreenshot: returned_to_compose
- back
- runFlow:
    when:
      visible: "Discard"
    commands:
      - tapOn: "Discard"
