appId: ${APP_ID}
tags:
  - mail
  - manual
name: snoozed_folder_opens
---
- runFlow: ../../setup/sign_in.yaml
- assertVisible: "Inbox"
- swipe:
    start: 5%,50%
    end: 80%,50%
- waitForAnimationToEnd
- tapOn:
    text: "Snoozed"
    optional: true
- extendedWaitUntil:
    visible: "Snoozed"
    timeout: 10000
- takeScreenshot: snoozed_folder
