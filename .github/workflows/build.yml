name: build

on:
  push:
    paths:
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.toml'
      - 'gradle/**'
      - 'gradlew'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.toml'
      - 'gradle/**'
      - 'gradlew'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASTER_UNSIGNED: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: install NDK r27c
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.2.12479018" >/dev/null
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked --version 4.1.2
      - name: build native crypto from source
        run: bash rust/aster-crypto-ffi/scripts/build_android.sh
      - run: ./gradlew assembleFullRelease assembleFdroidRelease
      - uses: actions/upload-artifact@v4
        with:
          name: full-release
          path: app/build/outputs/apk/full/release/*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: fdroid-release
          path: app/build/outputs/apk/fdroid/release/*.apk
