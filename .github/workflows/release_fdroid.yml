name: release_fdroid

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release_fdroid:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked --version 4.1.2

      - name: build native crypto from source
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: bash rust/aster-crypto-ffi/scripts/build_android.sh

      - name: build fdroid flavor
        run: ./gradlew assembleFdroidRelease

      - name: upload unsigned fdroid apk
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-unsigned
          path: app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
