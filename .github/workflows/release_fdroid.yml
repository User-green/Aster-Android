name: release_fdroid

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release_fdroid:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: install NDK r27c
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.2.12479018" >/dev/null
          ndk="$ANDROID_HOME/ndk/27.2.12479018"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_LATEST_HOME=$ndk" >> "$GITHUB_ENV"

      - name: install rust 1.92.0
        run: |
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
          rustup target add --toolchain 1.92.0 aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: install cargo-ndk
        run: cargo +1.92.0 install cargo-ndk --locked --version 4.1.2

      - name: build native crypto from source
        run: bash rust/aster-crypto-ffi/scripts/build_android.sh

      - name: build fdroid flavor
        run: ./gradlew assembleFdroidRelease

      - name: sign fdroid apk
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          version=$(grep -E 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "$KEYSTORE_BASE64" | base64 -d > release.jks
          apksigner=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$apksigner" sign \
            --ks release.jks \
            --ks-key-alias aster-mail \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --alignment-preserved \
            --out "Aster-Mail-fdroid-$version.apk" \
            app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
          "$apksigner" verify --print-certs "Aster-Mail-fdroid-$version.apk"
          rm -f release.jks

      - name: cleanup keystore
        if: always()
        run: rm -f release.jks

      - uses: actions/upload-artifact@v4
        with:
          name: fdroid-signed
          path: Aster-Mail-fdroid-*.apk

      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Aster-Mail-fdroid-*.apk
